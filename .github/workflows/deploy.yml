name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  SERVER_IMAGE: ghcr.io/inbotwetrust/hockey-server
  WEB_IMAGE: ghcr.io/inbotwetrust/hockey-web
  HEALTH_URL: https://hockey.inbotwetrust.ru/api/health

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        env:
          SHA: ${{ github.sha }}
        run: echo "tag=sha-${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build and push web image
        uses: docker/build-push-action@v5
        env:
          BOT_USERNAME: ${{ vars.VITE_TELEGRAM_BOT_USERNAME }}
          VK_APP_ID: ${{ vars.VITE_VK_APP_ID || '54571497' }}
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          build-args: |
            VITE_TELEGRAM_BOT_USERNAME=${{ env.BOT_USERNAME }}
            VITE_VK_APP_ID=${{ env.VK_APP_ID }}
            APP_BUILD_SHA=${{ github.sha }}
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Upload compose and Caddy config
        env:
          USER: ${{ secrets.DEPLOY_USER }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          scp -i ~/.ssh/id_ed25519 \
            docker-compose.yml Caddyfile \
            "${USER}@${HOST}:${REMOTE_PATH}/"

      - name: Pull images and restart services on VPS
        env:
          USER: ${{ secrets.DEPLOY_USER }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYSTEM_USER_ID: ${{ secrets.SYSTEM_USER_ID }}
          SYSTEM_CHAT_NAME: ${{ vars.SYSTEM_CHAT_NAME }}
          PUSH_VAPID_PUBLIC_KEY: ${{ secrets.PUSH_VAPID_PUBLIC_KEY }}
          PUSH_VAPID_PRIVATE_KEY: ${{ secrets.PUSH_VAPID_PRIVATE_KEY }}
          PUSH_VAPID_SUBJECT: ${{ vars.PUSH_VAPID_SUBJECT || 'mailto:push@hockey.inbotwetrust.ru' }}
          OBJECT_STORAGE_ENDPOINT: ${{ secrets.OBJECT_STORAGE_ENDPOINT }}
          OBJECT_STORAGE_REGION: ${{ secrets.OBJECT_STORAGE_REGION }}
          OBJECT_STORAGE_BUCKET: ${{ secrets.OBJECT_STORAGE_BUCKET }}
          OBJECT_STORAGE_TENANT_ID: ${{ secrets.OBJECT_STORAGE_TENANT_ID }}
          OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.OBJECT_STORAGE_ACCESS_KEY_ID }}
          OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          OBJECT_STORAGE_PUBLIC_BASE_URL: ${{ secrets.OBJECT_STORAGE_PUBLIC_BASE_URL }}
          OBJECT_STORAGE_MAX_UPLOAD_BYTES: ${{ vars.OBJECT_STORAGE_MAX_UPLOAD_BYTES || '26214400' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "${USER}@${HOST}" \
            IMAGE_TAG="$IMAGE_TAG" \
            GHCR_USER="$GHCR_USER" \
            GHCR_TOKEN="$GHCR_TOKEN" \
            REMOTE_PATH="$REMOTE_PATH" \
            SYSTEM_USER_ID="$SYSTEM_USER_ID" \
            SYSTEM_CHAT_NAME="$SYSTEM_CHAT_NAME" \
            PUSH_VAPID_PUBLIC_KEY="$PUSH_VAPID_PUBLIC_KEY" \
            PUSH_VAPID_PRIVATE_KEY="$PUSH_VAPID_PRIVATE_KEY" \
            PUSH_VAPID_SUBJECT="$PUSH_VAPID_SUBJECT" \
            OBJECT_STORAGE_ENDPOINT="$OBJECT_STORAGE_ENDPOINT" \
            OBJECT_STORAGE_REGION="$OBJECT_STORAGE_REGION" \
            OBJECT_STORAGE_BUCKET="$OBJECT_STORAGE_BUCKET" \
            OBJECT_STORAGE_TENANT_ID="$OBJECT_STORAGE_TENANT_ID" \
            OBJECT_STORAGE_ACCESS_KEY_ID="$OBJECT_STORAGE_ACCESS_KEY_ID" \
            OBJECT_STORAGE_SECRET_ACCESS_KEY="$OBJECT_STORAGE_SECRET_ACCESS_KEY" \
            OBJECT_STORAGE_PUBLIC_BASE_URL="$OBJECT_STORAGE_PUBLIC_BASE_URL" \
            OBJECT_STORAGE_MAX_UPLOAD_BYTES="$OBJECT_STORAGE_MAX_UPLOAD_BYTES" \
            bash -s <<'ENDSSH'
          set -euo pipefail
          cd "$REMOTE_PATH"
          if [ -z "${PUSH_VAPID_PUBLIC_KEY:-}" ] || [ -z "${PUSH_VAPID_PRIVATE_KEY:-}" ]; then
            echo "PUSH_VAPID_PUBLIC_KEY and PUSH_VAPID_PRIVATE_KEY GitHub secrets are required for production push notifications"
            exit 1
          fi
          for name in \
            OBJECT_STORAGE_ENDPOINT \
            OBJECT_STORAGE_REGION \
            OBJECT_STORAGE_BUCKET \
            OBJECT_STORAGE_TENANT_ID \
            OBJECT_STORAGE_ACCESS_KEY_ID \
            OBJECT_STORAGE_SECRET_ACCESS_KEY \
            OBJECT_STORAGE_PUBLIC_BASE_URL
          do
            if [ -z "${!name:-}" ]; then
              echo "$name GitHub secret is required for production object storage"
              exit 1
            fi
          done
          # VPS occasionally flaps its IPv6 route to ghcr.io so the first
          # `docker login` times out. Retry with a short backoff before failing.
          for i in 1 2 3 4 5; do
            if echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin; then
              break
            fi
            [ "$i" = 5 ] && echo "docker login failed after 5 attempts" && exit 1
            echo "docker login attempt $i failed, retry in 10s..."
            sleep 10
          done
          export IMAGE_TAG PUSH_VAPID_PUBLIC_KEY PUSH_VAPID_PRIVATE_KEY PUSH_VAPID_SUBJECT
          export OBJECT_STORAGE_ENDPOINT OBJECT_STORAGE_REGION OBJECT_STORAGE_BUCKET
          export OBJECT_STORAGE_TENANT_ID OBJECT_STORAGE_ACCESS_KEY_ID
          export OBJECT_STORAGE_SECRET_ACCESS_KEY OBJECT_STORAGE_PUBLIC_BASE_URL
          export OBJECT_STORAGE_MAX_UPLOAD_BYTES
          # Same flap can drop `compose pull` mid-transfer; retry a few times.
          for i in 1 2 3; do
            if docker compose pull; then
              break
            fi
            [ "$i" = 3 ] && echo "docker compose pull failed after 3 attempts" && exit 1
            echo "compose pull attempt $i failed, retry in 10s..."
            sleep 10
          done
          # `docker compose run` inherits parent stdin — our parent stdin is
          # the heredoc itself, so without `-T < /dev/null` the run step
          # consumes the rest of the script and the `up --force-recreate`
          # line silently never executes. Manifests as prod stuck on the
          # previous IMAGE_TAG while Actions reports success.
          docker compose run --rm -T server node packages/server/dist/db/migrate-cli.js < /dev/null
          # Idempotent system-channel seed: no-op if the chat already exists,
          # auto-picks the earliest user as `created_by` when SYSTEM_USER_ID
          # isn't set (the secret is optional). Failures are non-fatal so a
          # missing/empty users table doesn't block unrelated deploys.
          CHAT_NAME="${SYSTEM_CHAT_NAME:-Общий чат}"
          docker compose run --rm -T \
            -e SYSTEM_USER_ID="${SYSTEM_USER_ID:-}" \
            server node packages/server/dist/chat/seed-cli.js "$CHAT_NAME" < /dev/null \
            || echo "[deploy] chat:seed of '$CHAT_NAME' failed (non-fatal); continuing"
          # Force app containers to pick up newly pulled images.
          # Plain `up -d` was staying silent on an already-running server
          # after a new IMAGE_TAG was pulled, leaving prod on the old bundle.
          docker compose up -d --force-recreate --remove-orphans server push-worker web caddy < /dev/null
          docker image prune -f
          docker logout ghcr.io
          ENDSSH

      - name: Smoke test
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            if curl -fsSL --max-time 10 "$HEALTH_URL" | tee /dev/stderr | grep -q '"ok":true'; then
              echo "Smoke test passed on attempt $i"
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
            [ "$i" = 5 ] && echo "Smoke test failed after 5 attempts" && exit 1
          done

          APP_URL="${HEALTH_URL%/api/health}"
          html="$(curl -fsSL --max-time 10 "$APP_URL/")"
          asset_path="$(printf '%s' "$html" | sed -n 's/.*src="\([^"]*\/assets\/index-[^"]*\.js\)".*/\1/p')"
          if [ -z "$asset_path" ]; then
            echo "Could not find web entry asset in index.html"
            exit 1
          fi
          js="$(curl -fsSL --max-time 15 "$APP_URL$asset_path")"
          printf '%s' "$js" | grep -q 'Прикрепить файл'
          printf '%s' "$js" | grep -q 'Записать голосовое'
          printf '%s' "$js" | grep -q 'Загрузить аватар канала'
          echo "Frontend smoke test passed for $asset_path"
