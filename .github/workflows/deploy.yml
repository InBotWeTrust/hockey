name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  SERVER_IMAGE: ghcr.io/inbotwetrust/hockey-server
  WEB_IMAGE: ghcr.io/inbotwetrust/hockey-web
  HEALTH_URL: https://hockey.inbotwetrust.ru/api/health

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        env:
          SHA: ${{ github.sha }}
        run: echo "tag=sha-${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build and push web image
        uses: docker/build-push-action@v5
        env:
          BOT_USERNAME: ${{ vars.VITE_TELEGRAM_BOT_USERNAME }}
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          build-args: |
            VITE_TELEGRAM_BOT_USERNAME=${{ env.BOT_USERNAME }}
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Upload compose and Caddy config
        env:
          USER: ${{ secrets.DEPLOY_USER }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          scp -i ~/.ssh/id_ed25519 \
            docker-compose.yml Caddyfile \
            "${USER}@${HOST}:${REMOTE_PATH}/"

      - name: Pull images and restart services on VPS
        env:
          USER: ${{ secrets.DEPLOY_USER }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "${USER}@${HOST}" \
            IMAGE_TAG="$IMAGE_TAG" \
            GHCR_USER="$GHCR_USER" \
            GHCR_TOKEN="$GHCR_TOKEN" \
            REMOTE_PATH="$REMOTE_PATH" \
            bash -s <<'ENDSSH'
          set -euo pipefail
          cd "$REMOTE_PATH"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          export IMAGE_TAG
          docker compose pull
          docker compose run --rm server node packages/server/dist/db/migrate-cli.js
          # Force app containers to pick up newly pulled images.
          # Plain `up -d` was staying silent on an already-running server
          # after a new IMAGE_TAG was pulled, leaving prod on the old bundle.
          docker compose up -d --force-recreate --remove-orphans server web caddy
          docker image prune -f
          docker logout ghcr.io
          ENDSSH

      - name: Smoke test
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            if curl -fsSL --max-time 10 "$HEALTH_URL" | tee /dev/stderr | grep -q '"ok":true'; then
              echo "Smoke test passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed after 5 attempts"
          exit 1
