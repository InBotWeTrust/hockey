name: ultimate-hockey

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  server:
    image: ghcr.io/inbotwetrust/hockey-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DAILY_SEED_SECRET: ${DAILY_SEED_SECRET}
      VK_APP_ID: ${VK_APP_ID:-54571497}
      ACCOUNT_RECOVERY_TELEGRAM_PROVIDER_UIDS: ${ACCOUNT_RECOVERY_TELEGRAM_PROVIDER_UIDS:-}
      PUSH_VAPID_PUBLIC_KEY: ${PUSH_VAPID_PUBLIC_KEY:-}
      PUSH_VAPID_PRIVATE_KEY: ${PUSH_VAPID_PRIVATE_KEY:-}
      PUSH_VAPID_SUBJECT: ${PUSH_VAPID_SUBJECT:-}
      PUSH_SCHEDULER_ENABLED: ${PUSH_SCHEDULER_ENABLED:-false}
      PUSH_WORKER_ENABLED: ${PUSH_WORKER_ENABLED:-false}
      PUSH_WORKER_CONCURRENCY: ${PUSH_WORKER_CONCURRENCY:-5}
      PUSH_WORKER_BATCH_SIZE: ${PUSH_WORKER_BATCH_SIZE:-50}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-}
      OBJECT_STORAGE_TENANT_ID: ${OBJECT_STORAGE_TENANT_ID:-}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
      OBJECT_STORAGE_PUBLIC_BASE_URL: ${OBJECT_STORAGE_PUBLIC_BASE_URL:-}
      OBJECT_STORAGE_MAX_UPLOAD_BYTES: ${OBJECT_STORAGE_MAX_UPLOAD_BYTES:-26214400}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  push-worker:
    image: ghcr.io/inbotwetrust/hockey-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ['node', 'packages/server/dist/push/worker-cli.js']
    environment:
      NODE_ENV: ${NODE_ENV}
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DAILY_SEED_SECRET: ${DAILY_SEED_SECRET}
      VK_APP_ID: ${VK_APP_ID:-54571497}
      ACCOUNT_RECOVERY_TELEGRAM_PROVIDER_UIDS: ${ACCOUNT_RECOVERY_TELEGRAM_PROVIDER_UIDS:-}
      PUSH_VAPID_PUBLIC_KEY: ${PUSH_VAPID_PUBLIC_KEY:-}
      PUSH_VAPID_PRIVATE_KEY: ${PUSH_VAPID_PRIVATE_KEY:-}
      PUSH_VAPID_SUBJECT: ${PUSH_VAPID_SUBJECT:-}
      PUSH_WORKER_CONCURRENCY: ${PUSH_WORKER_CONCURRENCY:-5}
      PUSH_WORKER_BATCH_SIZE: ${PUSH_WORKER_BATCH_SIZE:-50}
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ghcr.io/inbotwetrust/hockey-web:${IMAGE_TAG:-latest}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - server
      - web

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
